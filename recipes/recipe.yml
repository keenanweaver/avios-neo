---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: avios-neo

description: Aurora-DX-Nvidia with customizations for Aviture.

base-image: ghcr.io/ublue-os/aurora-dx-nvidia-open
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /
  - from-file: base/packages.yml
  - from-file: base/dod.yml
  - from-file: base/flatpak.yml
  - from-file: base/fonts.yml
  - from-file: base/branding.yml

  - type: signing
